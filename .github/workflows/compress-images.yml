name: Compress images

on:
  workflow_dispatch:
  push:
    paths:
      - 'assets/**/*.jpg'
      - 'assets/**/*.jpeg'
      - 'assets/**/*.png'

jobs:
  compress:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install imagemagick
        run: sudo apt-get install -y imagemagick

      - name: Compress images
        run: |
          find assets -type f \( -name "*.jpg" -o -name "*.jpeg" \) \
            ! -name "payment-qr*" \
            -exec bash -c '
              orig=$(identify -format "%wx%h" "$1")
              convert "$1" -quality 75 -resize "800x800>" "$1"
              echo "Compressed $1 ($orig)"
            ' _ {} \;
          find assets -type f -name "*.png" \
            ! -name "payment-qr*" \
            -exec convert {} -quality 75 {} \;

      - name: Commit compressed images
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: compress images [skip ci]'
